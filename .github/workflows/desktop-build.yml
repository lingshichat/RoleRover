name: Build Desktop Application

on:
  push:
    branches: [main, tauri-rust-desktop-rewrite]
    tags: ['v*']
  pull_request:
    branches: [main, tauri-rust-desktop-rewrite]
  workflow_dispatch:

jobs:
  build:
    name: Build Desktop App
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install dependencies
        run: pnpm install

      - name: Ensure updater signing key
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            pnpm --prefix desktop exec tauri signer generate --ci --write-keys .tauri/updater.key --force
          } else {
            Write-Host "Using repository TAURI_SIGNING_PRIVATE_KEY secret."
          }
        shell: powershell
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build Tauri Desktop
        run: pnpm run build:tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rolerover-desktop-windows
          path: |
            .codex-cargo-target/desktop-tauri/release/bundle/msi/*.msi
            .codex-cargo-target/desktop-tauri/release/bundle/nsis/*.exe
          if-no-files-found: error
